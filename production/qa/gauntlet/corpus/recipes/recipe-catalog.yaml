# Gauntlet forge mutation recipe catalog
# Operators mutate policy JSON only. Forbidden: locked eval C#, DelegationBridge,
# ReplayGolden, CatalogWriteGate write paths, inventing gauntlet.expect without regen.

version: 1
updated: 2026-07-23

recipes:
  - id: platform-swap-underused
    dims: [platform, orbat]
    tierMin: 1
    preconditions: ["catalog-roster-available"]
    noveltyTags: [rare-platform, orbat-mix]
    forbiddenTouches: [gauntlet.expect-without-regen, DelegationBridge, CatalogWriteGate]
    description: >
      Replace one or more unit platformIds with underused catalog IDs from
      coverage-map counts / underusedPlatformHint while keeping domain mix valid.

  - id: orbat-asymmetric-ratio
    dims: [platform, orbat]
    tierMin: 2
    preconditions: ["tier-roster"]
    noveltyTags: [asymmetric-force, pressure]
    forbiddenTouches: [gauntlet.expect-without-regen]
    description: >
      Skew blue/red unit counts or capability (e.g. dense red vs lean blue) within
      tier platform-mix caps.

  - id: mission-combo-escort-strike
    dims: [mission]
    tierMin: 2
    preconditions: []
    noveltyTags: [multi-mission]
    forbiddenTouches: [gauntlet.expect-without-regen]
    description: Combine escort + strike objectives in one policy intent.

  - id: mission-concurrent-asw-aaw
