# Primary CI — replaces dotnet-ci, graphite-ci, graphite-post-merge-ci, and Gitleaks in gitnexus-security.
# Setup: docs/engineering/buildkite-ci.md

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "true"
  BUILDKITE_GIT_CLONE_FLAGS: "--depth=250"

steps:
  - label: ":graphite: Graphite CI optimizer"
    key: graphite
    soft_fail: true
    if: build.env("GRAPHITE_CI_OPTIMIZER_TOKEN") != null && build.env("GRAPHITE_CI_OPTIMIZER_TOKEN") != ""
    plugins:
      - withgraphite/graphite-ci#main:
          graphite_token: "${GRAPHITE_CI_OPTIMIZER_TOKEN}"

  - wait

  - label: ":dotnet: Build and test"
    key: dotnet
    plugins:
      - docker#v5.8.0:
          image: "mcr.microsoft.com/dotnet/sdk:8.0.400"
          mount-checkout: true
          workdir: /workdir
          command:
            - bash
            - tools/buildkite/dotnet-ci.sh

  - label: ":gitleaks: Secret scan"
    key: gitleaks
    soft_fail: true
    plugins:
      - docker#v5.8.0:
          image: "zricethezav/gitleaks:latest"
          mount-checkout: true
          workdir: /workdir
          command:
            - detect
            - --source=/workdir
            - --verbose

  - label: ":repeat: Baltic replay golden (main)"
    key: baltic-replay
    branches: "main"
    plugins:
      - docker#v5.8.0:
          image: "mcr.microsoft.com/dotnet/sdk:8.0.400"
          mount-checkout: true
          workdir: /workdir
          command:
            - bash
            - tools/buildkite/baltic-replay.sh
