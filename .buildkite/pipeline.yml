# Primary CI — replaces dotnet-ci, graphite-ci, graphite-post-merge-ci, and Gitleaks in gitnexus-security.
# Setup: docs/engineering/buildkite-ci.md

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "true"
  # Gitleaks scans git history; ensure enough depth on PR builds (repo has ~220 commits).
  BUILDKITE_GIT_CLONE_FLAGS: "--depth=250"

steps:
  - label: ":graphite: Graphite CI optimizer"
    key: graphite
    soft_fail: true
    if: build.env("GRAPHITE_CI_OPTIMIZER_TOKEN") != null && build.env("GRAPHITE_CI_OPTIMIZER_TOKEN") != ""
    plugins:
      - withgraphite/graphite-ci#main:
          graphite_token: "${GRAPHITE_CI_OPTIMIZER_TOKEN}"

  - wait

  - label: ":gitleaks: Secret scan"
    key: gitleaks
    command: >
      docker run --rm
      -v "$$BUILDKITE_BUILD_CHECKOUT_PATH:/workdir"
      -w /workdir
      zricethezav/gitleaks:latest
      detect --source=/workdir --verbose

  - label: ":dotnet: Build and test"
    key: dotnet
    command: >
      docker run --rm
      -v "$$BUILDKITE_BUILD_CHECKOUT_PATH:/workdir"
      -w /workdir
      mcr.microsoft.com/dotnet/sdk:8.0.400
      bash tools/buildkite/dotnet-ci.sh

  - label: ":repeat: Baltic replay golden (main)"
    key: baltic-replay
    branches: "main"
    command: >
      docker run --rm
      -v "$$BUILDKITE_BUILD_CHECKOUT_PATH:/workdir"
      -w /workdir
      mcr.microsoft.com/dotnet/sdk:8.0.400
      bash tools/buildkite/baltic-replay.sh
