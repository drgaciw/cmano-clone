# Primary CI — see docs/engineering/buildkite-ci.md
# 2026-07-09 optimization pass: Release build -> sharded test (parallelism: 4),
# plus parallel siblings (gitleaks, Baltic replay, GitNexus).
# Graphite CI optimizer plugin removed previously (pre-checkout empty-pipeline replace
# blocked :hammer: on stacks) — see docs/engineering/graphite-github-substitute-plan.md.
#
# Upload-rejection history (PR #263):
# - #535: cache key/{{ checksum }} → rejected ~3s
# - #541: cache paths/name/size only → still rejected ~3s
# - #552: no cache, but analytics plugin/complex if/soft_fail list/extra steps → still ~2s
# Keep this file as close as possible to main's working attribute surface while
# preserving the build/test split + sharding. Re-add retries/timeouts/annotations
# only after a green upload is confirmed.

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "true"
  BUILDKITE_GIT_CLONE_FLAGS: "--depth=250"
  NUGET_PACKAGES: ".nuget/packages"

steps:
  # Blocking gate MUST run first — Release build only (test execution is sharded below).
  - label: ":hammer: Build"
    key: build
    command: bash tools/buildkite/agent-dotnet-build.sh
    retry:
      automatic:
        - exit_status: "*"
          limit: 1

  - label: ":test_tube: Test %n"
    key: test
    depends_on: build
    parallelism: 4
    command: bash tools/buildkite/run-tests-sharded.sh
    artifact_paths:
      - "test-results/**/*.trx"
    retry:
      automatic:
        - exit_status: "*"
          limit: 1

  - label: ":memo: Test summary annotation"
    key: test-summary
    depends_on: test
    allow_dependency_failure: true
    command: bash tools/buildkite/annotate-test-summary.sh

  - label: ":gitleaks: Secret scan"
    key: gitleaks
    soft_fail: true
    command: bash tools/buildkite/agent-gitleaks.sh

  - label: ":repeat: Baltic replay golden (main)"
    key: baltic-replay
    branches: main
    command: bash tools/buildkite/agent-baltic-replay.sh
    artifact_paths:
      - "test-results-replay/**/*.trx"

  - label: ":gitnexus: PR impact analysis"
    key: gitnexus-pr
    if: build.pull_request.id != null
    soft_fail: true
    command: bash tools/buildkite/agent-gitnexus-pr-analysis.sh

  - label: ":gitnexus: Reindex knowledge graph (main)"
    key: gitnexus-reindex
    branches: main
    soft_fail: true
    command: bash tools/buildkite/agent-gitnexus-reindex.sh
