# Primary CI — see docs/engineering/buildkite-ci.md
# PR #263 recovery path: match main's proven blocking gate so upload+run succeed.
# Optimization scripts (agent-dotnet-build.sh, run-tests-sharded.sh,
# annotate-test-summary.sh, gitnexus exit-75) remain in tools/buildkite/ for a
# follow-up once Buildkite API logs diagnose #554/#558 (~1m30s step failures).
#
# Upload-rejection history (do NOT reintroduce without green upload):
# - native cache: (any form) → ~3s reject on this org
# - complex retry/timeout/analytics/plugin extras → ~2s reject (#552)
# Graphite CI optimizer plugin removed previously — see graphite-github-substitute-plan.md.

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "true"
  BUILDKITE_GIT_CLONE_FLAGS: "--depth=250"

steps:
  # Blocking gate MUST run first — same as origin/main (agent-dotnet-ci.sh).
  - label: ":hammer: Build and test"
    key: build
    command: bash tools/buildkite/agent-dotnet-ci.sh
    retry:
      automatic:
        - exit_status: "*"
          limit: 1

  - label: ":gitleaks: Secret scan"
    key: gitleaks
    soft_fail: true
    command: bash tools/buildkite/agent-gitleaks.sh

  - label: ":repeat: Baltic replay golden (main)"
    key: baltic-replay
    branches: main
    command: bash tools/buildkite/agent-baltic-replay.sh

  - label: ":gitnexus: PR impact analysis"
    key: gitnexus-pr
    if: build.pull_request.id != null
    soft_fail: true
    command: bash tools/buildkite/agent-gitnexus-pr-analysis.sh

  - label: ":gitnexus: Reindex knowledge graph (main)"
    key: gitnexus-reindex
    branches: main
    soft_fail: true
    command: bash tools/buildkite/agent-gitnexus-reindex.sh
