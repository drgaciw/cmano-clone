# Primary CI — see docs/engineering/buildkite-ci.md
# 2026-07-09 optimization pass (PR #263):
# - Split scripts: agent-dotnet-build.sh + run-tests-sharded.sh (usable with
#   BUILDKITE_PARALLEL_JOB{,_COUNT} for future multi-agent sharding)
# - Blocking gate stays a SINGLE command step (main-compatible attribute surface)
#   so one agent runs build then all test projects — avoids depends_on/parallelism
#   job-graph issues observed on Build #554 after upload was fixed.
# - Soft siblings unchanged from main (gitleaks, Baltic replay, GitNexus).
#
# Upload-rejection history:
# - #535: cache key/{{ checksum }} → ~3s reject
# - #541: cache paths/name/size → ~3s reject
# - #552: no cache but complex retries/analytics/soft_fail list → ~2s reject
# - #554: simplified YAML uploaded OK; multi-step depends_on+parallelism:4 failed ~1m29s
# Native step-level `cache:` is NOT used (Pro/feature-gated; rejects upload here).
# Graphite CI optimizer plugin removed previously — see graphite-github-substitute-plan.md.

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "true"
  BUILDKITE_GIT_CLONE_FLAGS: "--depth=250"
  NUGET_PACKAGES: ".nuget/packages"

steps:
  # Blocking gate MUST run first (same shape as main's single :hammer: step).
  # Runs Release build, then all test projects via the sharded runner with
  # JOB_COUNT=1 (all projects on this agent). Multi-agent parallelism can be
  # re-enabled once Buildkite logs confirm agent capacity for depends_on DAGs.
  - label: ":hammer: Build and test"
    key: build
    command: |
      set -euo pipefail
      bash tools/buildkite/agent-dotnet-build.sh
      # Single-agent shard covering every *.Tests.csproj (no multi-job graph).
      export BUILDKITE_PARALLEL_JOB=0
      export BUILDKITE_PARALLEL_JOB_COUNT=1
      bash tools/buildkite/run-tests-sharded.sh
      bash tools/buildkite/annotate-test-summary.sh
    retry:
      automatic:
        - exit_status: "*"
          limit: 1
    artifact_paths:
      - "test-results/**/*.trx"

  - label: ":gitleaks: Secret scan"
    key: gitleaks
    soft_fail: true
    command: bash tools/buildkite/agent-gitleaks.sh

  - label: ":repeat: Baltic replay golden (main)"
    key: baltic-replay
    branches: main
    command: bash tools/buildkite/agent-baltic-replay.sh

  - label: ":gitnexus: PR impact analysis"
    key: gitnexus-pr
    if: build.pull_request.id != null
    soft_fail: true
    command: bash tools/buildkite/agent-gitnexus-pr-analysis.sh

  - label: ":gitnexus: Reindex knowledge graph (main)"
    key: gitnexus-reindex
    branches: main
    soft_fail: true
    command: bash tools/buildkite/agent-gitnexus-reindex.sh
