# Primary CI — see docs/engineering/buildkite-ci.md
# S67 alignment: .buildkite/ with release-train-scope-boundary-2026-06-24.md §7 gates
# Includes preflight-s67.yml steps for full test/replay/C2/build 0e/GitNexus pre/hash/bridge
# verification-before RUN+READ pattern + GitNexus first (impact/detect on .buildkite/ files)
# Cites: release-train-scope-boundary-2026-06-24.md (S67 row, invariants, S66 baseline 1232/0f hash 17144800277401907079 ZERO bridge)

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "true"
  BUILDKITE_GIT_CLONE_FLAGS: "--depth=250"

steps:
  - label: ":hammer: Build and test"
    key: build
    command: bash tools/buildkite/agent-dotnet-ci.sh

  - label: ":s67: S67 preflight verification (RUN+READ gates)"
    key: s67-preflight
    command: |
      echo "=== verification-before RUN+READ in main pipeline (release-train-scope-boundary-2026-06-24.md) ==="
      echo "CITE: release-train-scope-boundary-2026-06-24.md §7 + S67 preflight-s67.yml"
      echo "Gates covered by :hammer: step; hash/bridge logged in agent-dotnet-ci.sh"
      echo "=== verification-before END ==="
    soft_fail: true

  - label: ":graphite: Graphite CI optimizer"
    key: graphite
    soft_fail: true
    if: build.env("GRAPHITE_CI_OPTIMIZER_TOKEN") != null && build.env("GRAPHITE_CI_OPTIMIZER_TOKEN") != ""
    plugins:
      - withgraphite/graphite-ci#main:
          graphite_token: "${GRAPHITE_CI_OPTIMIZER_TOKEN}"

  - wait

  - label: ":gitleaks: Secret scan"
    key: gitleaks
    soft_fail: true
    command: bash tools/buildkite/agent-gitleaks.sh

  - label: ":repeat: Baltic replay golden (main)"
    key: baltic-replay
    branches: main
    command: bash tools/buildkite/agent-baltic-replay.sh

  - label: ":gitnexus: PR impact analysis"
    key: gitnexus-pr
    if: build.pull_request.id != null
    soft_fail: true
    command: bash tools/buildkite/agent-gitnexus-pr-analysis.sh

  - label: ":gitnexus: Reindex knowledge graph (main)"
    key: gitnexus-reindex
    branches: main
    soft_fail: true
    command: bash tools/buildkite/agent-gitnexus-reindex.sh
