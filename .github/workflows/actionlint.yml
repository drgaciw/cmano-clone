name: Actionlint

# Lints GitHub Actions workflow files to catch invalid YAML, bad if:
# expressions, and shell issues (via shellcheck) before they merge.
# Cheap and fast; only runs when workflow files change.
#
# Note: 'if: false' remains on the two CodeQL jobs in gitnexus-security.yml
# while GitHub Actions billing is blocked (CodeQL runs are expensive).
# actionlint flags that as a "constant expression" error [if-cond], so it is
# ignored via -ignore. The regex uses '.' instead of a literal space because
# raven-actions/actionlint splits the flags string on whitespace. Other checks
# (invalid YAML, bad expressions, shellcheck) remain active.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/**'

permissions:
  contents: read

jobs:
  actionlint:
    name: Lint workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run actionlint
        uses: raven-actions/actionlint@v2
        with:
          flags: -ignore constant.expression
