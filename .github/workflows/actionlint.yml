name: Actionlint

# Lints GitHub Actions workflow files to catch invalid YAML, bad if:
# expressions, and shell issues (via shellcheck) before they merge.
# Cheap and fast; only runs when workflow files change.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/workflows/**'

permissions:
  contents: read

jobs:
  actionlint:
    name: Lint workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run actionlint
        uses: raven-actions/actionlint@v2
