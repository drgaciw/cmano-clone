name: GitNexus Auto-Reindex

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reindex:
    name: Reindex Knowledge Graph
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install GitNexus
        run: |
          set -euo pipefail
          npm install -g gitnexus
          gitnexus --version | tee gitnexus-version.txt
        env:
          GITNEXUS_SKIP_OPTIONAL_GRAMMARS: '1'

      - name: Analyze & Reindex
        run: |
          set -o pipefail
          mkdir -p .gitnexus/logs
          gitnexus analyze 2>&1 | tee .gitnexus/logs/analyze.log
        env:
          GITNEXUS_WORKER_POOL_SIZE: '4'

      - name: Verify Index Status
        run: |
          set -o pipefail
          mkdir -p .gitnexus/logs
          gitnexus status 2>&1 | tee .gitnexus/logs/status.log

      - name: Upload GitNexus Diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gitnexus-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            .gitnexus/
            gitnexus-version.txt
          if-no-files-found: warn
          retention-days: 14
