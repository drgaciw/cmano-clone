name: .NET Tests

# Runs the ProjectAegis.Delegation test suite on every push and PR.
# This is a blocking gate: per the project coding standards, no merge if tests fail.
# It is also what actually runs the determinism golden-replay regression
# (ReplayGoldenTests) — keeping the deterministic-sim invariant enforced.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: dotnet test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET (from global.json)
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore ProjectAegis.sln

      - name: Build
        run: dotnet build ProjectAegis.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test ProjectAegis.sln --configuration Release --no-build --verbosity normal
