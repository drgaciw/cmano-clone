name: .NET CI

# Blocking gate for headless simulation + delegation stack (no Unity license required).
# Play Mode smoke runs the same loop as unity/ProjectAegis/PLAYMODE-SMOKE.md headless path.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: dotnet-ci-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore ProjectAegis.sln

      - name: Build
        run: dotnet build ProjectAegis.sln -c Release --no-restore

      - name: Test (full solution)
        run: dotnet test ProjectAegis.sln -c Release --no-build -v minimal

      - name: Test (PlayMode smoke harness)
        run: >
          dotnet test
          src/ProjectAegis.Delegation.UnityAdapter.Tests/ProjectAegis.Delegation.UnityAdapter.Tests.csproj
          -c Release --no-build -v minimal
          --filter FullyQualifiedName~PlayModeSmokeHarnessTests