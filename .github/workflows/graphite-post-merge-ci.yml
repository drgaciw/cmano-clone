name: Post-Merge CI (Graphite)

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  post_merge_tests:
    uses: ./.github/workflows/dotnet-reusable.yml

  replay_golden:
    needs: post_merge_tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore ProjectAegis.sln

      - name: Build
        run: dotnet build ProjectAegis.sln -c Release --no-restore

      - name: Test (Baltic replay golden suite)
        run: >
          dotnet test
          src/ProjectAegis.Delegation.UnityAdapter.Tests/ProjectAegis.Delegation.UnityAdapter.Tests.csproj
          -c Release --no-build -v minimal
          --filter FullyQualifiedName~ReplayGolden