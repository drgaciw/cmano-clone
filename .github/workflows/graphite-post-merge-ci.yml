name: Post-Merge CI (Graphite)

# Graphite recommends breaking CI into multiple workflows with different triggers:
#   1. CI that runs on all PRs                    -> graphite-ci.yml
#   2. CI that runs after PRs merge to main       -> this file
#
# Running expensive checks (e.g. integration tests, deployments) only after merge
# to main reduces CI cost significantly when using stacked PRs, since each stack
# level would otherwise trigger a full CI run.
#
# Source: https://graphite.com/docs/stacking-and-ci

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  post_merge_tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore ProjectAegis.sln

      - name: Build
        run: dotnet build ProjectAegis.sln -c Release --no-restore

      - name: Test (full solution)
        run: dotnet test ProjectAegis.sln -c Release --no-build -v minimal

      - name: Test (PlayMode smoke harness)
        run: >
          dotnet test
          src/ProjectAegis.Delegation.UnityAdapter.Tests/ProjectAegis.Delegation.UnityAdapter.Tests.csproj
          -c Release --no-build -v minimal
          --filter FullyQualifiedName~PlayModeSmokeHarnessTests
