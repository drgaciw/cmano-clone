# DISABLED (2026-06-20): GitHub Actions billing blocked; primary CI is Buildkite
# (`buildkite/cmano-clone`). Gitleaks runs on Buildkite (`agent-gitleaks.sh`).
# Re-enable when billing is restored — see production/qa/sprint-19-ci-local-gate-2026-06-08.md.
name: GitNexus Security Checks

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write
  pull-requests: read

jobs:
  codeql-csharp:
    if: false
    name: CodeQL (C#)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Build solution (CodeQL trace)
        run: dotnet build ProjectAegis.sln -c Release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        continue-on-error: true

  codeql-javascript:
    if: false
    name: CodeQL (JavaScript/TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        continue-on-error: true

  dependency-review:
    if: false
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        continue-on-error: true
